{% extends "base.html" %}

{% block content %}
<div class="container mx-auto px-4 py-16 max-w-2xl">
  <h1 class="text-4xl font-bold mb-8 text-center">Свяжитесь со мной</h1>
  
  <div class="bg-gray-800 rounded-lg shadow-xl p-8">
    {% if success %}
    <div class="mb-6 p-4 bg-green-600 text-white rounded">
      ✓ Сообщение успешно отправлено!
    </div>
    {% endif %}
    
    {% if error %}
    <div class="mb-6 p-4 bg-red-600 text-white rounded">
      ✗ Ошибка: {{ error }}
    </div>
    {% endif %}
    
    <form method="POST" action="/contact" class="space-y-6">
      <div>
        <label for="name" class="block text-sm font-medium mb-2">Имя</label>
        <input 
          type="text" 
          id="name" 
          name="name" 
          required
          class="w-full px-4 py-2 rounded bg-gray-700 border border-gray-600 focus:border-indigo-500 focus:outline-none"
          placeholder="Ваше имя"
        >
      </div>
      
      <div>
        <label for="email" class="block text-sm font-medium mb-2">Email</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          required
          class="w-full px-4 py-2 rounded bg-gray-700 border border-gray-600 focus:border-indigo-500 focus:outline-none"
          placeholder="your@email.com"
        >
      </div>
      
      <div>
        <label for="message" class="block text-sm font-medium mb-2">Сообщение</label>
        <textarea 
          id="message" 
          name="message" 
          rows="6"
          required
          class="w-full px-4 py-2 rounded bg-gray-700 border border-gray-600 focus:border-indigo-500 focus:outline-none"
          placeholder="Ваше сообщение..."
        ></textarea>
      </div>
      
      <button 
        type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded transition duration-200"
      >
        Отправить сообщение
      </button>
    </form>
    
    <div class="mt-8 text-center">
      <a href="/" class="text-indigo-400 hover:text-indigo-300">← Вернуться на главную</a>
    </div>
  </div>
</div>
{% endblock %}
