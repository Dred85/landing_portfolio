global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # Метрики FastAPI
  - job_name: "fastapi"
    metrics_path: /metrics
    static_configs:
      - targets: ["web:8000"]

  # Метрики Locust
  - job_name: "locust"
    metrics_path: /metrics
    static_configs:
      - targets: ["locust:8089"]
