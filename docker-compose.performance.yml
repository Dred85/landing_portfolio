version: "3.9"

# Docker Compose конфигурация для тестирования производительности
# 
# Использование:
#   docker compose -f docker-compose.performance.yml up --build
#
# Особенности:
#   - DISABLE_EMAIL=true для избежания спама при POST тестах
#   - Быстрый loadshape_performance.py (3 минуты)
#   - Все метрики экспортируются в Prometheus/Grafana

networks:
  monitoring:
    driver: bridge

volumes:
  grafana_data:

services:
  web:
    build: .
    container_name: fastapi_app_perf
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APP_NAME=${APP_NAME:-Portfolio FastAPI}
      - CONTACT_EMAIL=${CONTACT_EMAIL:-your.email@example.com}
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_TO_EMAIL=${SMTP_TO_EMAIL}
      - DISABLE_EMAIL=true  # 🔒 Заглушка для тестов производительности
    networks:
      - monitoring
    restart: unless-stopped

  locust:
    image: locustio/locust:2.19.0
    container_name: locust_perf
    entrypoint: ["sh", "/mnt/locust/docker-entrypoint.sh"]
    ports:
      - "8089:8089"
    volumes:
      - ./locust:/mnt/locust
    command: >
      -f /mnt/locust/loadshape_performance.py
      --host=http://web:8000
      --web-host=0.0.0.0
      --headless
      --run-time 3m
    depends_on:
      - web
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_perf
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - web
      - locust
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana_perf
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - monitoring
